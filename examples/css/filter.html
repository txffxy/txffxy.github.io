      -webkit-font-smoothing: antialiased;

    .img:hover {
      cursor: pointer;
      transition: filter .5s;
      filter: none !important;

    .btn:hover,
    .img1:hover {
      cursor: pointer;
      transition: filter .3s;
      filter: brightness(1.1) contrast(110%);

    .avator::after {
      content: "";
      position: absolute;
      top: 10%;
      left: 0%;
      width: 100%;
      height: 100%;
      background: inherit;
      background-size: 100% 100%;
      border-radius: 50%;
      transform: scale(.95);
      filter: blur(10px) brightness(80%) opacity(.8);
      z-index: -1;
    }

    .filter-mix::before {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #333;
      top: 40px;
      left: 40px;
      z-index: 2;
      filter: blur(6px);
      box-sizing: border-box;
      animation: filterBallMove 4s ease-out infinite;
    }

    .filter-mix::after {
      content: "";
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #3F51B5;
      top: 60px;
      right: 40px;
      z-index: 2;
      filter: blur(6px);
      animation: filterBallMove2 4s ease-out infinite;
    }

    @keyframes filterBallMove {
      50% {
        left: 140px;
      }
    }

    @keyframes filterBallMove2 {
      50% {
        right: 140px;
      }
    }
